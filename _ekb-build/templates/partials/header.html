<header class="hdr">
  <div class="wrap hdr__in">
    <a class="hdr__logo" href="/dostavka-grunta/">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M12 3c-4 4-6 7-6 10a6 6 0 0 0 12 0c0-3-2-6-6-10z"/></svg>
      <span>{{ site.brand }}</span>
    </a>
    <a class="hdr__phone" href="tel:{{ site.phone_href }}">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11.4 11.4 0 0 0 3.6.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.6a1 1 0 0 1-.25 1z"/></svg>
      <span class="hdr__num">{{ site.phone_display }}</span>
    </a>
    <span class="hdr__promise">{{ site.callback_promise }}</span>
  </div>
</header>
